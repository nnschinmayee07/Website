  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #F4F1EA; color: #3A3A3A; line-height: 1.7; }

    .profile-page { max-width: 900px; margin: 0 auto; padding: 40px 32px 80px; }

    .profile-back {
      font-family: 'Raleway', sans-serif; font-size: 0.78rem; font-weight: 700;
      color: #18453B; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
      margin-bottom: 32px; transition: color 0.2s;
    }
    .profile-back:hover { color: #E85D1F; }

    .profile-header { display: flex; gap: 32px; align-items: flex-start; margin-bottom: 40px; }

    .profile-photo {
      width: 140px; height: 140px; border-radius: 50%; overflow: hidden; flex-shrink: 0;
      background: linear-gradient(135deg, #2A2F40, #3A4050);
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.3); font-family: 'Raleway', sans-serif; font-weight: 700; font-size: 2rem;
      border: 4px solid #18453B;
    }
    .profile-photo img { width: 100%; height: 100%; object-fit: cover; }

    .profile-info { flex: 1; }
    .profile-name { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; color: #0B0F1A; margin-bottom: 4px; }
    .profile-role { font-family: 'Raleway', sans-serif; font-size: 0.85rem; color: #E85D1F; font-weight: 700; margin-bottom: 12px; letter-spacing: 0.04em; }
    .profile-meta { font-size: 0.85rem; color: #666; margin-bottom: 4px; }
    .profile-meta strong { color: #18453B; }

    .profile-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .profile-tag {
      font-family: 'Raleway', sans-serif; font-size: 0.68rem; font-weight: 700;
      color: #18453B; background: rgba(24,69,59,0.08); padding: 4px 12px; border-radius: 12px;
      letter-spacing: 0.04em;
    }

    .profile-section { margin-bottom: 36px; }
    .profile-section__title {
      font-family: 'Raleway', sans-serif; font-size: 0.78rem; font-weight: 800;
      color: #18453B; text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid rgba(24,69,59,0.15);
    }

    .profile-stat-row { display: flex; gap: 20px; margin-bottom: 32px; flex-wrap: wrap; }
    .profile-stat {
      background: #fff; border-radius: 12px; padding: 20px 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      text-align: center; flex: 1; min-width: 120px; border-top: 3px solid #18453B;
    }
    .profile-stat__num { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; color: #18453B; }
    .profile-stat__label { font-family: 'Raleway', sans-serif; font-size: 0.68rem; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }

    .pub-item {
      background: #fff; border-radius: 10px; padding: 16px 20px; margin-bottom: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.04); border-left: 3px solid #E85D1F;
    }
    .pub-item__title { font-family: 'Raleway', sans-serif; font-weight: 700; font-size: 0.88rem; color: #0B0F1A; margin-bottom: 4px; line-height: 1.4; }
    .pub-item__journal { font-size: 0.78rem; color: #E85D1F; font-style: italic; }
    .pub-item__year { font-size: 0.72rem; color: #888; }

    .patent-item, .book-item, .award-item {
      padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 0.88rem; color: #444;
    }
    .patent-item:last-child, .book-item:last-child, .award-item:last-child { border-bottom: none; }
    .patent-item strong, .book-item strong, .award-item strong { color: #0B0F1A; }
    .patent-num, .book-isbn { font-size: 0.72rem; color: #888; margin-left: 8px; }

    .subject-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .subject-chip {
      font-size: 0.82rem; padding: 8px 16px; background: #fff; border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06); color: #3A3A3A;
    }

    .empty-msg { font-style: italic; color: #999; font-size: 0.88rem; }

    @media (max-width: 600px) {
      .profile-header { flex-direction: column; align-items: center; text-align: center; }
      .profile-tags { justify-content: center; }
      .profile-stat-row { flex-direction: column; }
    }
  </style>
</head>

        conferences: 3, confTitles: [],
        books: [{t: "Emerging Frontiers in Manufacturing", isbn: "", y: "2023"}, {t: "Engineering Graphics", isbn: "", y: "2022"}],
        patents: [], awards: []
      },
      "m-satyanarayana-gupta": {
        name: "Dr. M. Satyanarayana Gupta", role: "HOD, Professor", dept: "Aeronautical Engineering",
        photo: "images/aeronautical/satyanarayana.jpg", qual: "Ph.D, M.Tech (Mechanical), B.E (Mechanical)",
        email: "msngupta.m@mlrinstitutions.ac.in", exp: "25 years", joined: "01-11-2014",
        areas: ["Design and Production", "FEM", "Machine Design", "Smart Aerospace Structures"],
        subjects: ["FEM", "Design of Machine Members", "Engineering Drawing", "Machine Tools", "Mechanical Vibrations", "Kinematics/Dynamics of Machinery", "Smart Aerospace Structures"],
        journals: Array.from({length: 34}, (_, i) => ({t: "SCI/SCIE/SCOPUS paper " + (i+1), j: "International Journal", y: String(2024 - Math.floor(i/10))})).slice(0, 6),
        conferences: 15, confTitles: [],
        books: [],
        patents: Array.from({length: 10}, (_, i) => ({t: "Patent " + (i+1) + " (Specimen Holder, Agricultural UAV, etc.)", n: "Published", y: String(2019 + Math.floor(i/3))})).slice(0, 5),
        awards: []
      },
      "n-ramanjaneyulu": {
        name: "Dr. N. Ramanjaneyulu", role: "Professor, HOD", dept: "Master of Business Administration",
        photo: "images/mba/ramanjaneyulu.jpeg", qual: "Ph.D (Management), MBA",
        email: "", exp: "20+ years", joined: "",
        areas: ["Strategic Management", "Leadership", "Organizational Behaviour"],
        subjects: ["Strategic Management", "Organizational Behaviour", "Business Environment"],

        conferences: 8, confTitles: [], books: [], patents: [], awards: []
      }
    };

    // Generic profile for faculty not in detailed DB
    function getGenericProfile(id) {
      // Try to find in the page that linked here via data attributes
      var parts = id.split('-');
      var name = parts.map(function(p) { return p.charAt(0).toUpperCase() + p.slice(1); }).join(' ');
      return {
        name: name, role: "Faculty Member", dept: "", photo: "",
        qual: "", email: "", exp: "", joined: "", areas: [], subjects: [],
        journals: [], conferences: 0, confTitles: [], books: [], patents: [], awards: []
      };
    }

    function renderProfile(data) {
      var h = '';

      // Header
      var initials = data.name.replace(/Dr\.|Mr\.|Mrs\.|Ms\.|Prof\./g,'').trim().split(' ');
      var ini = initials.length >= 2 ? initials[0][0] + initials[initials.length-1][0] : initials[0].substring(0,2);

      h += '<div class="profile-header">';
      h += '<div class="profile-photo">';
      if (data.photo) h += '<img src="' + data.photo + '" alt="' + data.name + '" onerror="this.style.display=\'none\';this.parentElement.textContent=\'' + ini.toUpperCase() + '\'" />';
      else h += ini.toUpperCase();
      h += '</div>';
      h += '<div class="profile-info">';
      h += '<div class="profile-name">' + data.name + '</div>';
      h += '<div class="profile-role">' + data.role + '</div>';
      if (data.dept) h += '<p class="profile-meta"><strong>Department:</strong> ' + data.dept + '</p>';
      if (data.qual) h += '<p class="profile-meta"><strong>Qualification:</strong> ' + data.qual + '</p>';
      if (data.exp) h += '<p class="profile-meta"><strong>Experience:</strong> ' + data.exp + '</p>';
      if (data.email) h += '<p class="profile-meta"><strong>Email:</strong> ' + data.email + '</p>';
      if (data.areas.length) {
        h += '<div class="profile-tags">';
        data.areas.forEach(function(a) { h += '<span class="profile-tag">' + a + '</span>'; });
        h += '</div>';
      }
      h += '</div></div>';

      // Stats
      var totalPubs = data.journals.length + data.conferences;
      if (totalPubs || data.books.length || data.patents.length) {
        h += '<div class="profile-stat-row">';
        if (data.journals.length) h += '<div class="profile-stat"><div class="profile-stat__num">' + data.journals.length + '</div><div class="profile-stat__label">Journal Papers</div></div>';
        if (data.conferences) h += '<div class="profile-stat"><div class="profile-stat__num">' + data.conferences + '</div><div class="profile-stat__label">Conference Papers</div></div>';
        if (data.books.length) h += '<div class="profile-stat"><div class="profile-stat__num">' + data.books.length + '</div><div class="profile-stat__label">Books Published</div></div>';
        if (data.patents.length) h += '<div class="profile-stat"><div class="profile-stat__num">' + data.patents.length + '</div><div class="profile-stat__label">Patents</div></div>';
        h += '</div>';
      }

      // Subjects Taught
      if (data.subjects.length) {
        h += '<div class="profile-section"><div class="profile-section__title">Subjects Taught</div><div class="subject-chips">';
        data.subjects.forEach(function(s) { h += '<div class="subject-chip">' + s + '</div>'; });
        h += '</div></div>';
      }

      // Journal Publications
      if (data.journals.length) {
        h += '<div class="profile-section"><div class="profile-section__title">Journal Publications</div>';
        data.journals.forEach(function(p) {
          h += '<div class="pub-item"><div class="pub-item__title">' + p.t + '</div><div class="pub-item__journal">' + p.j + '</div><span class="pub-item__year">' + p.y + '</span></div>';
        });
        h += '</div>';
      }

      // Conference Papers
      if (data.confTitles && data.confTitles.length) {
        h += '<div class="profile-section"><div class="profile-section__title">Conference Papers (' + data.conferences + ' total)</div>';
        data.confTitles.forEach(function(t) {
          h += '<div class="pub-item"><div class="pub-item__title">' + t + '</div></div>';
        });
        if (data.conferences > data.confTitles.length) h += '<p class="empty-msg">...and ' + (data.conferences - data.confTitles.length) + ' more conference papers</p>';
        h += '</div>';
      }

      // Books
      if (data.books.length) {
        h += '<div class="profile-section"><div class="profile-section__title">Books Published</div>';
        data.books.forEach(function(b) {
          h += '<div class="book-item"><strong>' + b.t + '</strong><span class="book-isbn">ISBN: ' + b.isbn + ' (' + b.y + ')</span></div>';
        });
        h += '</div>';
      }

      // Patents
      if (data.patents.length) {
        h += '<div class="profile-section"><div class="profile-section__title">Patents</div>';
        data.patents.forEach(function(p) {
          h += '<div class="patent-item"><strong>' + p.t + '</strong><span class="patent-num">' + p.n + ' (' + p.y + ')</span></div>';
        });
        h += '</div>';
      }

      // Awards
      if (data.awards.length) {
        h += '<div class="profile-section"><div class="profile-section__title">Awards & Recognition</div>';
        data.awards.forEach(function(a) {
          h += '<div class="award-item"><strong>' + a.t + '</strong> — ' + a.org + ' (' + a.y + ')</div>';
        });
        h += '</div>';
      }

      // If no detailed data
      if (!data.journals.length && !data.conferences && !data.books.length && !data.patents.length) {
        h += '<div class="profile-section"><div class="profile-section__title">Research & Publications</div>';
        h += '<p class="empty-msg">Detailed research profile is being compiled. Check back soon.</p>';
        h += '</div>';
      }

      return h;
    }

    // Load profile from hash
    (function() {
      var id = window.location.hash.replace('#', '');
      if (!id) {
        document.getElementById('profileContent').innerHTML = '<p class="empty-msg">No faculty selected. Please go back and click a faculty profile.</p>';
        return;
      }

      var data = facultyDB[id];
      if (!data) {
        // Try to extract info from URL params
        var params = new URLSearchParams(window.location.search);
        data = {
          name: decodeURIComponent(params.get('name') || id.split('-').map(function(p){return p.charAt(0).toUpperCase()+p.slice(1)}).join(' ')),
          role: decodeURIComponent(params.get('role') || 'Faculty Member'),
          dept: decodeURIComponent(params.get('dept') || ''),
          photo: decodeURIComponent(params.get('photo') || ''),
          qual: decodeURIComponent(params.get('qual') || ''),
          email: '', exp: '', joined: '',
          areas: (params.get('areas') || '').split(',').filter(Boolean),
          subjects: [], journals: [], conferences: 0, confTitles: [], books: [], patents: [], awards: []
        };
      }

      document.title = data.name + ' — MLRIT Faculty';
      document.getElementById('profileContent').innerHTML = renderProfile(data);
    })();
  </script>
