  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #F4F1EA; color: #3A3A3A; line-height: 1.7; }

    .profile-page { max-width: 900px; margin: 0 auto; padding: 40px 32px 80px; }

    .profile-back {
      font-family: 'Raleway', sans-serif; font-size: 0.78rem; font-weight: 700;
      color: #18453B; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
      margin-bottom: 32px; transition: color 0.2s;
    }
    .profile-back:hover { color: #E85D1F; }

    .profile-header { display: flex; gap: 32px; align-items: flex-start; margin-bottom: 40px; }

    .profile-photo {
      width: 140px; height: 140px; border-radius: 50%; overflow: hidden; flex-shrink: 0;
      background: linear-gradient(135deg, #2A2F40, #3A4050);
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.3); font-family: 'Raleway', sans-serif; font-weight: 700; font-size: 2rem;
      border: 4px solid #18453B;
    }
    .profile-photo img { width: 100%; height: 100%; object-fit: cover; }

    .profile-info { flex: 1; }
    .profile-name { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; color: #0B0F1A; margin-bottom: 4px; }
    .profile-role { font-family: 'Raleway', sans-serif; font-size: 0.85rem; color: #E85D1F; font-weight: 700; margin-bottom: 12px; letter-spacing: 0.04em; }
    .profile-meta { font-size: 0.85rem; color: #666; margin-bottom: 4px; }
    .profile-meta strong { color: #18453B; }

    .profile-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .profile-tag {
      font-family: 'Raleway', sans-serif; font-size: 0.68rem; font-weight: 700;
      color: #18453B; background: rgba(24,69,59,0.08); padding: 4px 12px; border-radius: 12px;
      letter-spacing: 0.04em;
    }

    .profile-section { margin-bottom: 36px; }
    .profile-section__title {
      font-family: 'Raleway', sans-serif; font-size: 0.78rem; font-weight: 800;
      color: #18453B; text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid rgba(24,69,59,0.15);
    }

    .profile-stat-row { display: flex; gap: 20px; margin-bottom: 32px; flex-wrap: wrap; }
    .profile-stat {
      background: #fff; border-radius: 12px; padding: 20px 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      text-align: center; flex: 1; min-width: 120px; border-top: 3px solid #18453B;
    }
    .profile-stat__num { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; color: #18453B; }
    .profile-stat__label { font-family: 'Raleway', sans-serif; font-size: 0.68rem; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }

    .pub-item {
      background: #fff; border-radius: 10px; padding: 16px 20px; margin-bottom: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.04); border-left: 3px solid #E85D1F;
    }
    .pub-item__title { font-family: 'Raleway', sans-serif; font-weight: 700; font-size: 0.88rem; color: #0B0F1A; margin-bottom: 4px; line-height: 1.4; }
    .pub-item__journal { font-size: 0.78rem; color: #E85D1F; font-style: italic; }
    .pub-item__year { font-size: 0.72rem; color: #888; }

    .patent-item, .book-item, .award-item {
      padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 0.88rem; color: #444;
    }
    .patent-item:last-child, .book-item:last-child, .award-item:last-child { border-bottom: none; }
    .patent-item strong, .book-item strong, .award-item strong { color: #0B0F1A; }
    .patent-num, .book-isbn { font-size: 0.72rem; color: #888; margin-left: 8px; }

    .subject-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .subject-chip {
      font-size: 0.82rem; padding: 8px 16px; background: #fff; border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06); color: #3A3A3A;
    }

    .empty-msg { font-style: italic; color: #999; font-size: 0.88rem; }

    .profile-hod-badge {
      display: inline-block; font-family: 'Raleway', sans-serif; font-size: 0.65rem;
      font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
      color: #fff; background: #18453B; padding: 3px 10px; border-radius: 4px; margin-bottom: 8px;
    }

    @media (max-width: 600px) {
      .profile-header { flex-direction: column; align-items: center; text-align: center; }
      .profile-tags { justify-content: center; }
      .profile-stat-row { flex-direction: column; }
    }
  </style>
</head>

    function renderProfile(data) {
      var h = '';
      var isHOD = /hod|head of department/i.test(data.role);

      // Safe initials — strip titles, take first letters of first two name words
      var nameParts = (data.name || '').replace(/^(Dr|Mr|Mrs|Ms|Prof)\.?\s*/i, '').trim().split(/\s+/);
      var ini = (nameParts.length >= 2
        ? (nameParts[0][0] || '') + (nameParts[nameParts.length - 1][0] || '')
        : (nameParts[0] || '').substring(0, 2)
      ).toUpperCase();

      // Photo — use data-ini attribute on the container so onerror can read it without inline string injection
      h += '<div class="profile-header">';
      h += '<div class="profile-photo" id="profilePhoto" data-ini="' + ini + '">';
      if (data.photo) {
        h += '<img src="' + data.photo + '" alt="' + data.name.replace(/"/g, '&quot;') + '" '
           + 'onerror="this.style.display=\'none\';var c=this.closest(\'[data-ini]\');if(c)c.textContent=c.getAttribute(\'data-ini\')" />';
      } else {
        h += ini;
      }
      h += '</div>';

      h += '<div class="profile-info">';
      if (isHOD) h += '<div class="profile-hod-badge">Head of Department</div>';
      h += '<div class="profile-name">' + data.name + '</div>';
      h += '<div class="profile-role">' + data.role + '</div>';
      if (data.dept)   h += '<p class="profile-meta"><strong>Department:</strong> '    + data.dept   + '</p>';
      if (data.qual)   h += '<p class="profile-meta"><strong>Qualification:</strong> ' + data.qual   + '</p>';
      if (data.exp)    h += '<p class="profile-meta"><strong>Experience:</strong> '    + data.exp    + '</p>';
      if (data.joined) h += '<p class="profile-meta"><strong>Joined:</strong> '        + data.joined + '</p>';
      if (data.email)  h += '<p class="profile-meta"><strong>Email:</strong> '         + data.email  + '</p>';
      h += '</div></div>';

      // Stats — only render if there's at least one non-zero value
      var jLen = (data.journals  || []).length;
      var bLen = (data.books     || []).length;
      var pLen = (data.patents   || []).length;
      var conf = data.conferences || 0;
      if (jLen || conf || bLen || pLen) {
        h += '<div class="profile-stat-row">';
        if (jLen) h += '<div class="profile-stat"><div class="profile-stat__num">' + jLen + '</div><div class="profile-stat__label">Journal Papers</div></div>';
        if (conf) h += '<div class="profile-stat"><div class="profile-stat__num">' + conf + '</div><div class="profile-stat__label">Conference Papers</div></div>';
        if (bLen) h += '<div class="profile-stat"><div class="profile-stat__num">' + bLen + '</div><div class="profile-stat__label">Books Published</div></div>';
        if (pLen) h += '<div class="profile-stat"><div class="profile-stat__num">' + pLen + '</div><div class="profile-stat__label">Patents</div></div>';
        h += '</div>';
      }

      // Research Areas — skip section entirely if empty
      if (data.areas && data.areas.length) {
        h += '<div class="profile-section"><div class="profile-section__title">Research Areas</div>';
        h += '<div class="profile-tags" style="margin-top:0;">';
        data.areas.forEach(function(a) { h += '<span class="profile-tag">' + a + '</span>'; });
        h += '</div></div>';
      }

      // Subjects Taught — skip section entirely if empty
      if (data.subjects && data.subjects.length) {
        h += '<div class="profile-section"><div class="profile-section__title">Subjects Taught</div>';
        h += '<div class="subject-chips">';
        data.subjects.forEach(function(s) { h += '<div class="subject-chip">' + s + '</div>'; });
        h += '</div></div>';
      }

      // Publications — only render section if there's something to show
      var hasJournals = jLen > 0;
      var hasConf     = conf > 0;
      if (hasJournals || hasConf) {
        h += '<div class="profile-section"><div class="profile-section__title">Publications</div>';
        if (hasJournals) {
          (data.journals || []).forEach(function(p) {
            h += '<div class="pub-item">'
               + '<div class="pub-item__title">' + p.t + '</div>'
               + '<div class="pub-item__journal">' + (p.j || '') + '</div>'
               + '<span class="pub-item__year">' + (p.y || '') + '</span>'
               + '</div>';
          });
        }
        if (hasConf) {
          var titles = data.confTitles || [];
          if (titles.length) {
            h += '<div style="margin-top:12px;font-family:\'Raleway\',sans-serif;font-size:0.72rem;font-weight:800;'
               + 'color:#18453B;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;">'
               + 'Conference Papers (' + conf + ' total)</div>';
            titles.forEach(function(t) {
              h += '<div class="pub-item"><div class="pub-item__title">' + t + '</div></div>';
            });
            if (conf > titles.length) {
              h += '<p class="empty-msg">...and ' + (conf - titles.length) + ' more conference papers</p>';
            }
          }
        }
        h += '</div>';
      }

      // Books — skip section entirely if empty
      if (bLen) {
        h += '<div class="profile-section"><div class="profile-section__title">Books</div>';
        (data.books || []).forEach(function(b) {
          var pub  = b.pub  ? ' — ' + b.pub : '';
          var isbn = b.isbn ? '<span class="book-isbn">ISBN: ' + b.isbn + '</span>' : '';
          h += '<div class="book-item"><strong>' + b.t + '</strong> (' + (b.y || '') + ')' + pub + ' ' + isbn + '</div>';
        });
        h += '</div>';
      }

      // Patents — skip section entirely if empty
      if (pLen) {
        h += '<div class="profile-section"><div class="profile-section__title">Patents</div>';
        (data.patents || []).forEach(function(p) {
          var num    = (typeof p === 'string') ? p : (p.t || '');
          var detail = (typeof p === 'object' && p.n)
            ? '<span class="patent-num">' + p.n + (p.y ? ' (' + p.y + ')' : '') + '</span>'
            : '';
          h += '<div class="patent-item"><strong>' + num + '</strong>' + detail + '</div>';
        });
        h += '</div>';
      }

      // Awards
      if (data.awards && data.awards.length) {
        h += '<div class="profile-section"><div class="profile-section__title">Awards and Recognition</div>';
        data.awards.forEach(function(a) {
          h += '<div class="award-item"><strong>' + a.t + '</strong> — ' + a.org + ' (' + a.y + ')</div>';
        });
        h += '</div>';
      }

      return h;
    }

    // Resolve faculty from hash, query params, or photo-derived slug
    (function() {
      var params = new URLSearchParams(window.location.search);
      var hash = window.location.hash.replace('#', '');
      var data = null;

      // Strategy 1: direct hash lookup
      if (hash && facultyDB[hash]) {
        data = facultyDB[hash];
      }

      // Strategy 2: derive slug from photo param (e.g. "images/cse/k-srinivas-rao.jpg" -> "k-srinivas-rao")
      if (!data && params.get('photo')) {
        var photo = decodeURIComponent(params.get('photo'));
        var slug = photo.replace(/^.*\//, '').replace(/\.[^.]+$/, '');
        // Normalize spaces to dashes for CDN filenames that may have spaces
        var slugNorm = slug.replace(/\s+/g, '-').replace(/[^a-z0-9-]/gi, '').toLowerCase();
        if (facultyDB[slug]) data = facultyDB[slug];
        else if (facultyDB[slugNorm]) data = facultyDB[slugNorm];
        else if (slugAliases[slug] && facultyDB[slugAliases[slug]]) data = facultyDB[slugAliases[slug]];
        else if (slugAliases[slugNorm] && facultyDB[slugAliases[slugNorm]]) data = facultyDB[slugAliases[slugNorm]];
      }

      // Strategy 3: match by name param against DB entries (with and without title prefix)
      if (!data && params.get('name')) {
        var qName = decodeURIComponent(params.get('name')).toLowerCase().trim();
        var qNameNoTitle = qName.replace(/^(dr|mr|mrs|ms|prof)\.?\s*/i, '').trim();
        for (var key in facultyDB) {
          var dbName = facultyDB[key].name.toLowerCase();
          var dbNameNoTitle = dbName.replace(/^(dr|mr|mrs|ms|prof)\.?\s*/i, '').trim();
          if (dbName === qName || dbNameNoTitle === qName || dbName === qNameNoTitle || dbNameNoTitle === qNameNoTitle) {
            data = facultyDB[key];
            break;
          }
        }
      }

      // Strategy 4: derive slug from name param (e.g. "Dr. K. Srinivas Rao" -> try known patterns)
      if (!data && params.get('name')) {
        var nameStr = decodeURIComponent(params.get('name'));
        var cleaned = nameStr.replace(/^(Dr|Mr|Mrs|Ms|Prof)\.?\s*/i, '').trim().toLowerCase();
        var slugFromName = cleaned.replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
        if (facultyDB[slugFromName]) data = facultyDB[slugFromName];
      }

      // Fallback: build profile from query params
      if (!data) {
        var name = decodeURIComponent(params.get('name') || '');
        if (!name && hash) name = hash.split('-').map(function(p){return p.charAt(0).toUpperCase()+p.slice(1)}).join(' ');
        if (!name) {
          document.getElementById('profileContent').innerHTML = '<p class="empty-msg">No faculty selected. Please go back and click a faculty profile.</p>';
          return;
        }
        data = {
          name: name,
          role: decodeURIComponent(params.get('role') || 'Faculty Member'),
          dept: decodeURIComponent(params.get('dept') || ''),
          photo: decodeURIComponent(params.get('photo') || ''),
          qual: decodeURIComponent(params.get('qual') || ''),
          email: '', exp: '', joined: '',
          areas: (params.get('areas') || '').split(',').filter(Boolean),
          subjects: [], journals: [], conferences: 0, confTitles: [], books: [], patents: [], awards: []
        };
      }

      document.title = data.name + ' — MLRIT Faculty';
      document.getElementById('profileContent').innerHTML = renderProfile(data);
    })();
  </script>
